version: '3.8'

services:
  # ============ 后端服务 ============
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    image: internal-chat-server:latest
    container_name: internal-chat-server
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - NODE_ENV=production
      - PORT=3001
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/internal_chat?schema=public
      - REDIS_URL=redis://redis:6379
      - JWT_SECRET=${JWT_SECRET:-internal-chat-secret-change-me-in-production}
      - JWT_EXPIRES_IN=7d
      - JWT_REFRESH_EXPIRES_IN=30d
      - FILE_STORAGE_PATH=/app/uploads
      - FILE_MAX_SIZE=524288000
      - CORS_ORIGINS=http://localhost,http://localhost:80,http://192.168.1.39,http://192.168.1.39:80,http://${SERVER_IP:-localhost},http://${SERVER_IP:-localhost}:80
      - LOG_LEVEL=info
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
    volumes:
      - uploads-data:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal-chat-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ============ 前端服务 ============
  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    image: internal-chat-web:latest
    container_name: internal-chat-web
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - server
    networks:
      - internal-chat-network

  # ============ PostgreSQL 数据库 ============
  postgres:
    image: postgres:16-alpine
    container_name: internal-chat-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: internal_chat
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d internal_chat"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - internal-chat-network

  # ============ Redis 缓存 ============
  redis:
    image: redis:7-alpine
    container_name: internal-chat-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - internal-chat-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
    driver: local
  redis-data:
    driver: local
  uploads-data:
    driver: local

networks:
  internal-chat-network:
    driver: bridge